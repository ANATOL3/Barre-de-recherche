<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>research</title>
</head>
<body>
    
<div class="recherche">

    <div class="logo-recherche"><img src="assets/svg/logo-research-black.svg"></div>

    <input  class="input-recherche" id="input" type="search" placeholder="Rechercher">

    <div class="effacer-recherche"><span class="croix1"></span><span class="croix2"></span></div>

  </div>




<style>

    .recherche {
        width: 30px;
        height: 30px;
        background: #ffffff;
        border: 1px solid #00000050;
        border-radius: 25px;
        padding: 5px;
        margin: 0 auto;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        overflow: hidden;
    }

    .recherche:hover {
        width: 150px;
        transition: all 0.3s ease;
    }

    .recherche.open {
        width: 300px;
    }

    .logo-recherche {
        width: 15px;
        height: 15px;
        opacity: 0.5;
        margin-left: 7.5px;
        position: absolute;
        user-select: none;
    }

    img {
        -webkit-user-drag: none;
    }

    .input-recherche {
        height: 25px;
        min-width: 150px;
        width: 80%;
        margin-left: 35px;
        margin-right: 10px;
        border: none;
        background: none;
        outline: none;
    }

    input[type="search"]::-webkit-search-cancel-button {
        display: none;
    }

    .effacer-recherche {
        width: 15px;
        height: 15px;
        margin-right: 5px;
        padding: 1px;
        border-radius: 10px;
        display: flex;
        position: relative;
        margin-left: auto;
        cursor: pointer;
    }

    .croix1 {
        position: absolute;
        width: 2px;
        height: 15px;
        background: gray;
        border-radius: 10px;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%) rotate(45deg);
    }

    .croix2 {
        position: absolute;
        width: 2px;
        height: 15px;
        background: gray;
        border-radius: 10px;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%) rotate(-45deg);
    }


</style>


<script>

    const recherche = document.querySelector(".recherche");
    const effacer_recherche = document.querySelector(".effacer-recherche");
    const input_reset = document.querySelector("input");

    recherche.addEventListener("click", () => {
        recherche.classList.add("open");
    });

    effacer_recherche.addEventListener("click", (event) => {
        event.stopPropagation();
        recherche.classList.remove("open");
        input_reset.value = "";
    })

</body>
</html>
